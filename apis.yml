aid: cucumber
url: https://raw.githubusercontent.com/api-evangelist/cucumber/refs/heads/main/apis.yml
kind: opensource
name: Cucumber
description: >-
  Cucumber is an open-source Behavior Driven Development (BDD) tool for running
  automated tests written in plain language using the Gherkin syntax. It
  enables collaboration between technical and non-technical team members by
  expressing executable specifications as Given/When/Then scenarios. Cucumber
  has implementations for many languages (JVM, JavaScript, Ruby, .NET, Python,
  Go, Rust) and a shared message protocol that connects parsers, runners, and
  reporters.
